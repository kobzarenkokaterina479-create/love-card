<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Je t’aime</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at center,#0b0b18,#050507 70%);
  overflow:hidden;
  font-family:Arial, sans-serif;
  color:white;
}

/* Подсказка */
.hint{
  position:absolute;
  top:60px;
  font-size:24px;
  opacity:0.9;
  animation: bounce 1.8s infinite;
  transition:opacity 0.5s;
}

@keyframes bounce{
  0%{ transform:translateY(0px); }
  50%{ transform:translateY(8px); }
  100%{ transform:translateY(0px); }
}

/* ===== КАРТОЧКА ===== */

.card{
  width:700px;
  height:450px;
  perspective:2000px;
  position:relative;
  cursor:pointer;
}

.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1.6s ease;
}

.card.open .card-inner{
  transform:rotateY(180deg);
}

.front, .back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  backface-visibility:hidden;
  overflow:hidden;
}

.front{
  background:linear-gradient(135deg,#ff5fa2,#ff87c2);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:44px;
  font-weight:bold;
  letter-spacing:2px;
  box-shadow:0 30px 60px rgba(0,0,0,0.6);
}

.back{
  background:#050507;
  transform:rotateY(180deg);
  display:flex;
  justify-content:center;
  align-items:center;
}

canvas{
  background:transparent;
  opacity:0;
  transform:scale(0.8);
  transition:opacity 1s ease, transform 1s ease;
}

.card.open canvas{
  opacity:1;
  transform:scale(1);
}
</style>
</head>

<body>

<div class="hint" id="hint">Нажми ↓</div>

<div class="card" id="card">
  <div class="card-inner">
    <div class="front">
      Je t’aime ❤️
    </div>
    <div class="back">
      <canvas id="c"></canvas>
    </div>
  </div>
</div>

<script>
const card = document.getElementById("card");
const hint = document.getElementById("hint");

card.addEventListener("click",()=>{
  card.classList.toggle("open");

  if(card.classList.contains("open")){
    hint.style.opacity="0";
  } else {
    hint.style.opacity="0.9";
  }
});

/* ===== СЕРДЦЕ ===== */

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = 600;
canvas.height = 400;

const TEXT = " I love you ";
const SCALE = 10;

let offset = 0;
let pulse = 0;
let particles = [];

function heart(t){
  const x = 16*Math.pow(Math.sin(t),3);
  const y = 13*Math.cos(t)
          -5*Math.cos(2*t)
          -2*Math.cos(3*t)
          -Math.cos(4*t);
  return {x,y};
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(canvas.width/2,canvas.height/2);

  const pulseScale = 1 + Math.sin(pulse)*0.03;
  ctx.font = "18px Arial";

  let charIndex = 0;

  for(let t=0;t<Math.PI*2;t+=0.05){

    const shifted = t + offset;
    const p = heart(shifted);
    const next = heart(shifted+0.01);

    const x = p.x*SCALE*pulseScale;
    const y = -p.y*SCALE*pulseScale;

    const angle = Math.atan2(
      -(next.y-p.y),
      next.x-p.x
    );

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);

    const hue = 320 + Math.sin(t+pulse)*20;
    ctx.fillStyle = `hsl(${hue},90%,70%)`;
    ctx.shadowColor = `hsl(${hue},100%,75%)`;
    ctx.shadowBlur = 15;

    ctx.fillText(TEXT[charIndex],0,0);
    ctx.restore();

    charIndex++;
    if(charIndex>=TEXT.length) charIndex=0;

    /* Блёстки */
    if(Math.random()<0.01){
      particles.push({
        x:x,
        y:y,
        life:30
      });
    }
  }

  /* Частицы */
  particles.forEach((p,i)=>{
    ctx.fillStyle="pink";
    ctx.globalAlpha=p.life/30;
    ctx.beginPath();
    ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
    p.life--;
    if(p.life<=0) particles.splice(i,1);
  });

  ctx.restore();

  offset += 0.01;
  pulse += 0.03;

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
